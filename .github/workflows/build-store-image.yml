name: Build and store image
on:
  workflow_call:
    inputs:
      image-name:
        required: true
        type: string
      image-tag:
        required: false
        type: string
        default: latest

      # Path of docker build context
      docker-build-context:
        required: false
        type: string
        default: .
      # Relative to context
      dockerfile-name:
        required: false
        type: string
        default: Dockerfile

      mix-environment:
        required: false
        type: string
        default: prod
      npm-script:
        required: false
        type: string
        default: build
    secrets:
      KEENMATE_REGISTRY_USERNAME:
        required: true
      KEENMATE_REGISTRY_PASSWORD:
        required: true
      KEENMATE_NPM_TOKEN:
        required: false
      NUGET_USERNAME:
        required: false
      NUGET_PASSWORD:
        required: false
jobs:
  build:
    name: Build and store image
    runs-on: self-hosted
    env:
      MIX_ENV: ${{ inputs.mix-environment }}
    steps:
    - uses: actions/checkout@v4
    - uses: docker/setup-buildx-action@v3
    - uses: docker/login-action@v3
      with:
        registry: registry.km8.es
        username: ${{ secrets.KEENMATE_REGISTRY_USERNAME }}
        password: ${{ secrets.KEENMATE_REGISTRY_PASSWORD }}
    - uses: docker/build-push-action@v6
      with:
        context: ${{ inputs.docker-build-context }}
        file: ${{ inputs.dockerfile-name }}
        push: true
        tags: |
          registry.km8.es/${{ inputs.image-name }}:${{ inputs.image-tag }}
        build-args: |
          NPM_TOKEN=${{ secrets.KEENMATE_NPM_TOKEN }}
          NPM_SCRIPT=${{ inputs.npm-script }}
          MIX_ENV=${{ inputs.mix-environment }}
          NUGET_USERNAME=${{ secrets.NUGET_USERNAME }}
          NUGET_PASSWORD=${{ secrets.NUGET_PASSWORD }}
